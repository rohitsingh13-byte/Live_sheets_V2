name: Test Snowflake

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: cmd
        run: python -m pip install -r requirements.txt --quiet

      - name: Run test query
        shell: cmd
        env:
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          SNOWFLAKE_PAT:         ${{ secrets.SNOWFLAKE_PAT }}
        run: python test_snowflake.py

      - name: Commit CSV to repo
        shell: cmd
        run: |
          git config user.email "rohit.singh13@cars24.com"
          git config user.name "Live Sheets Bot"
          git add data/test_result.csv
          git diff --cached --quiet || git commit -m "data: refresh test_result [skip ci]"
          git push origin main

      - name: Upload result CSV
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snowflake-test-run-${{ github.run_number }}
          path: data/test_result.csv
          retention-days: 7
