name: Live Sheets V2

# ── Trigger times (IST = UTC + 5:30) ────────────────────────────────────────
# Add or remove cron entries to match your schedule.
# Python auto-detects which slot to run based on current IST time (±45 min).
#
# cron format: minute hour day-of-month month day-of-week
#   '0  4 * * 1-5'  → 04:00 UTC = 09:30 IST  Mon–Fri
#   '30 5 * * 1-5'  → 05:30 UTC = 11:00 IST  Mon–Fri
#   '0  8 * * 1-5'  → 08:00 UTC = 13:30 IST  Mon–Fri
#   '30 10 * * 1-5' → 10:30 UTC = 16:00 IST  Mon–Fri

on:
  schedule:
    - cron: '0  4  * * 1-5'   # 09:30 IST  Mon–Fri
    - cron: '30 5  * * 1-5'   # 11:00 IST  Mon–Fri
    - cron: '0  8  * * 1-5'   # 13:30 IST  Mon–Fri
    - cron: '30 10 * * 1-5'   # 16:00 IST  Mon–Fri

  # Manual trigger (GitHub → Actions → "Run workflow")
  workflow_dispatch:
    inputs:
      slot:
        description: 'Time slot to run (e.g. 09:30). Leave blank to auto-detect.'
        required: false
        default: ''

jobs:
  refresh:
    # ── IMPORTANT: set this to self-hosted after installing the runner ────────
    # See setup/install_runner_steps.txt for instructions.
    runs-on: self-hosted
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python dependencies
        shell: powershell -ExecutionPolicy Bypass -File {0}
        run: python -m pip install -r requirements.txt --quiet

      - name: Run pipeline
        shell: powershell -ExecutionPolicy Bypass -File {0}
        env:
          APPSSCRIPT_URL:    ${{ secrets.APPSSCRIPT_URL }}
          APPSSCRIPT_SECRET: ${{ secrets.APPSSCRIPT_SECRET }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SNOWFLAKE_PAT:     ${{ secrets.SNOWFLAKE_PAT }}
          SCHEDULE_SLOT:     ${{ github.event.inputs.slot }}
        run: python run.py
